name: Main Branch CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  discussions: write

env:
  DATABASE_URL: mysql://terp_test:terp_test_password@localhost:3307/terp_test

jobs:
  # ================================================================
  # JOB 0: Unit tests — fast drift detector for main
  # Mirrors the pre-merge.yml unit-tests job so that if main is ever
  # merged with a red unit-test suite (e.g. via force-merge / admin
  # bypass / concurrent-PR interference), this job fails loudly on
  # every main push instead of staying silent until the next PR rebases.
  # Ref: TER-1210 — main silently drifted red and blocked 3 open PRs.
  # ================================================================
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test --run

  # ================================================================
  # JOB 1: Integration tests + build verification
  # These validate that the merge didn't break core data operations.
  # ================================================================
  test-and-verify:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: terp_test
          MYSQL_USER: terp_test
          MYSQL_PASSWORD: terp_test_password
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for MySQL
        run: |
          MAX_ATTEMPTS=30
          ATTEMPTS=0
          until mysqladmin ping -h 127.0.0.1 -P 3307 --silent 2>/dev/null; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "MySQL failed to start after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting for MySQL... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
            sleep 2
          done

      - name: Push database schema
        id: schema
        run: |
          echo "Pushing database schema..."
          pnpm drizzle-kit push --force 2>&1 | tee schema-output.txt || {
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "status=passed" >> $GITHUB_OUTPUT

      - name: Seed test database
        id: seed
        run: |
          echo "Seeding test database..."
          pnpm seed:light 2>&1 | tee seed-output.txt || {
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "status=passed" >> $GITHUB_OUTPUT

      - name: Run integration tests
        id: integration
        if: steps.schema.outputs.status == 'passed' && steps.seed.outputs.status == 'passed'
        run: |
          echo "Running integration tests..."
          pnpm test -- --config vitest.config.integration.ts --run --coverage --reporter=verbose 2>&1 | tee integration-output.txt || {
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "status=passed" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check test coverage
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "Test coverage: $COVERAGE%"
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "❌ Test coverage is below 80%"
              echo "status=warning" >> $GITHUB_OUTPUT
            else
              echo "✅ Test coverage is above 80%"
              echo "status=passed" >> $GITHUB_OUTPUT
            fi
          else
            echo "No coverage report found"
            echo "status=skipped" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Post Results Comment
        uses: actions/github-script@v8
        if: always()
        with:
          script: |
            const fs = require('fs');
            const steps = {
              schema: '${{ steps.schema.outputs.status }}',
              seed: '${{ steps.seed.outputs.status }}',
              integration: '${{ steps.integration.outputs.status }}',
            };

            const coveragePct = '${{ steps.coverage.outputs.coverage }}';

            let allPassed = steps.schema === 'passed' &&
                           steps.seed === 'passed' &&
                           steps.integration === 'passed';

            let body = allPassed ? '## ✅ Post-Merge Checks Passed\n\n' : '## ❌ Post-Merge Checks Failed\n\n';
            body += `**Commit:** \`${context.sha.substring(0, 7)}\`\n`;
            body += `**Branch:** \`main\`\n\n`;
            body += '---\n\n';

            // Schema push results
            body += steps.schema === 'passed' ? '**Database Schema:** ✅ Pushed\n' : '**Database Schema:** ❌ Failed\n';
            if (steps.schema === 'failed' && fs.existsSync('schema-output.txt')) {
              const output = fs.readFileSync('schema-output.txt', 'utf8');
              const lastLines = output.split('\n').slice(-30).join('\n');
              body += '<details><summary>View schema errors</summary>\n\n```\n' + lastLines + '\n```\n</details>\n\n';
            }

            // Seed results
            body += steps.seed === 'passed' ? '**Database Seed:** ✅ Completed\n' : '**Database Seed:** ❌ Failed\n';
            if (steps.seed === 'failed' && fs.existsSync('seed-output.txt')) {
              const output = fs.readFileSync('seed-output.txt', 'utf8');
              const lastLines = output.split('\n').slice(-30).join('\n');
              body += '<details><summary>View seed errors</summary>\n\n```\n' + lastLines + '\n```\n</details>\n\n';
            }

            // Integration test results
            body += steps.integration === 'passed' ? '**Integration Tests:** ✅ Passed\n' : '**Integration Tests:** ❌ Failed\n';
            if (steps.integration === 'failed' && fs.existsSync('integration-output.txt')) {
              const output = fs.readFileSync('integration-output.txt', 'utf8');
              const lastLines = output.split('\n').slice(-100).join('\n');
              body += '<details><summary>View integration test failures</summary>\n\n```\n' + lastLines + '\n```\n</details>\n\n';
            }

            // Coverage
            if (coveragePct) {
              body += `**Test Coverage:** ${coveragePct}%\n\n`;
            }

            // E2E note
            body += '\n**E2E Tests:** Full suite runs nightly. Targeted E2E ran during PR review.\n\n';

            body += '---\n\n';

            if (!allPassed) {
              body += '## 🚨 Action Required\n\n';
              body += 'The main branch build has failed. **All agents must stop work immediately** and check this status.\n\n';
              body += '**How to check this via GitHub CLI:**\n';
              body += '```bash\n';
              body += '# View this commit\'s status\n';
              body += 'gh api repos/EvanTenenbaum/TERP/commits/' + context.sha + '/comments\n\n';
              body += '# View the workflow run\n';
              body += 'gh run view ${{ github.run_id }}\n\n';
              body += '# View recent workflow runs\n';
              body += 'gh run list --limit 5\n';
              body += '```\n\n';
              body += '**What to do:**\n';
              body += '1. Read the error details in the dropdowns above\n';
              body += '2. Pull the latest changes: `git pull origin main`\n';
              body += '3. Run the failing tests locally\n';
              body += '4. Fix the issues\n';
              body += '5. Create a PR with the fix\n\n';
              body += '**Do not push more changes to main until this is fixed.**';
            } else {
              body += '## 🎉 Build Successful\n\n';
              body += 'All post-merge checks passed! The main branch is healthy.\n';
            }

            // Write build status to a file for agent verification
            const statusFile = '.github/BUILD_STATUS.md';
            const timestamp = new Date().toISOString();

            const statusContent = `# Latest Build Status\n\n` +
              `**Last Updated:** ${timestamp}\n` +
              `**Commit:** \`${context.sha}\`\n` +
              `**Status:** ${allPassed ? '✅ SUCCESS' : '❌ FAILED'}\n\n` +
              body;

            fs.writeFileSync(statusFile, statusContent);
            console.log('✅ Wrote build status to', statusFile);

            // Try to post commit comment (best effort)
            try {
              const comment = await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: body
              });
              console.log('✅ Posted commit comment:', comment.data.html_url);
            } catch (error) {
              console.warn('⚠️ Could not post commit comment:', error.message);
              console.log('Build status is available in', statusFile);
            }

      - name: Update build status on separate branch
        if: always()
        run: |
          if [ ! -f .github/BUILD_STATUS.md ]; then
            exit 0
          fi
          cp .github/BUILD_STATUS.md /tmp/BUILD_STATUS.md

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git fetch origin build-status:build-status 2>/dev/null || true

          if git show-ref --verify --quiet refs/heads/build-status; then
            git checkout -f build-status
          else
            git checkout -b build-status
          fi

          mkdir -p .github
          cp /tmp/BUILD_STATUS.md .github/BUILD_STATUS.md
          git add .github/BUILD_STATUS.md || true

          if ! git diff --staged --quiet; then
            git commit -m "Update build status [skip ci]" || true
            git push origin build-status || echo "Failed to push build status branch"
          else
            echo "No changes to BUILD_STATUS.md"
          fi

          git checkout main

      - name: Create fallback issue if comment failed
        uses: actions/github-script@v8
        if: failure() && steps.schema.outputs.status != ''
        with:
          script: |
            const steps = {
              schema: '${{ steps.schema.outputs.status }}',
              seed: '${{ steps.seed.outputs.status }}',
              integration: '${{ steps.integration.outputs.status }}',
            };

            let allPassed = steps.schema === 'passed' &&
                           steps.seed === 'passed' &&
                           steps.integration === 'passed';

            const title = allPassed
              ? `✅ Build ${context.sha.substring(0, 7)} succeeded (comment posting failed)`
              : `❌ Build ${context.sha.substring(0, 7)} failed`;

            const body = `## Build Status Notification\n\n` +
              `⚠️ **This issue was created because the automated commit comment failed to post.**\n\n` +
              `**Commit:** \`${context.sha}\`\n` +
              `**Branch:** \`main\`\n` +
              `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `### Test Results\n\n` +
              `- Database Schema: ${steps.schema === 'passed' ? '✅' : '❌'} ${steps.schema}\n` +
              `- Database Seed: ${steps.seed === 'passed' ? '✅' : '❌'} ${steps.seed}\n` +
              `- Integration Tests: ${steps.integration === 'passed' ? '✅' : '❌'} ${steps.integration}\n\n` +
              `**Action Required:** Fix the workflow permissions to allow commit comments.`;

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci/cd', 'automated']
              });
              console.log('✅ Created fallback issue for build status');
            } catch (error) {
              console.error('❌ Failed to create fallback issue:', error.message);
            }

      - name: Fail if any test failed
        if: steps.schema.outputs.status == 'failed' || steps.seed.outputs.status == 'failed' || steps.integration.outputs.status == 'failed'
        run: |
          echo "❌ One or more tests failed. See the commit comment for details."
          exit 1

      - name: Verify DigitalOcean deployment
        id: deploy
        if: success()
        run: |
          APP_URL="https://terp-app-b9s35.ondigitalocean.app"
          TARGET_COMMIT="${GITHUB_SHA}"
          TARGET_COMMIT_SHORT="${GITHUB_SHA::7}"
          VERIFICATION_START_EPOCH=$(date -u +%s)
          INITIAL_VERSION_COMPACT=$(curl -sf "${APP_URL}/version.json?ts=${VERIFICATION_START_EPOCH}" 2>/dev/null | jq -c '.' 2>/dev/null || true)

          echo "Waiting for DigitalOcean auto-deploy to start..."
          sleep 60

          MAX_ATTEMPTS=30
          ATTEMPTS=0
          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))

            VERSION_RESPONSE=$(curl -sf "${APP_URL}/version.json?ts=$(date +%s)" 2>/dev/null) || {
              echo "version.json unreachable (attempt $ATTEMPTS/$MAX_ATTEMPTS) — deploy may be in progress"
              sleep 30
              continue
            }

            LIVE_COMMIT=$(echo "$VERSION_RESPONSE" | jq -r '.commit // empty' 2>/dev/null)
            LIVE_BUILD_TIME=$(echo "$VERSION_RESPONSE" | jq -r '.buildTime // empty' 2>/dev/null)
            LIVE_VERSION_COMPACT=$(echo "$VERSION_RESPONSE" | jq -c '.' 2>/dev/null || true)
            LIVE_BUILD_EPOCH=$(date -u -d "$LIVE_BUILD_TIME" +%s 2>/dev/null || true)
            VERSION_CHANGED=false
            BUILD_TIME_IS_FRESH=false

            if [ -n "$LIVE_VERSION_COMPACT" ] && [ "$LIVE_VERSION_COMPACT" != "$INITIAL_VERSION_COMPACT" ]; then
              VERSION_CHANGED=true
            fi

            if [ -n "$LIVE_BUILD_EPOCH" ] && [ "$LIVE_BUILD_EPOCH" -ge $((VERIFICATION_START_EPOCH - 60)) ]; then
              BUILD_TIME_IS_FRESH=true
            fi

            HEALTH_RESPONSE=$(curl -sf "${APP_URL}/health" 2>/dev/null || true)
            HEALTH_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status // empty' 2>/dev/null)
            HEALTH_COMMIT=$(echo "$HEALTH_RESPONSE" | jq -r '.commit // empty' 2>/dev/null)

            if [ -n "$HEALTH_COMMIT" ] && [ -n "$LIVE_COMMIT" ] && [ "$HEALTH_COMMIT" != "$LIVE_COMMIT" ]; then
              echo "version.json reports ${LIVE_COMMIT} but /health reports ${HEALTH_COMMIT} (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
              sleep 30
              continue
            fi

            COMMIT_MATCHES=false
            if [ "$LIVE_COMMIT" = "$TARGET_COMMIT_SHORT" ] || [ "$LIVE_COMMIT" = "$TARGET_COMMIT" ]; then
              COMMIT_MATCHES=true
            fi

            if [ "$COMMIT_MATCHES" = true ] || { [ "$VERSION_CHANGED" = true ] && [ "$BUILD_TIME_IS_FRESH" = true ]; }; then
              if [ "$COMMIT_MATCHES" = false ]; then
                echo "ℹ️  Verified a fresh production build via changed version payload and buildTime ${LIVE_BUILD_TIME:-unknown}"
              fi

              if [ -n "$HEALTH_COMMIT" ] && [ "$COMMIT_MATCHES" = true ] && [ "$HEALTH_COMMIT" != "$TARGET_COMMIT_SHORT" ] && [ "$HEALTH_COMMIT" != "$TARGET_COMMIT" ]; then
                echo "/health still reports commit ${HEALTH_COMMIT} instead of ${TARGET_COMMIT_SHORT} (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                sleep 30
                continue
              fi

              echo "✅ Fresh deployment verified (commit: ${LIVE_COMMIT}, health: ${HEALTH_STATUS:-unknown}, buildTime: ${LIVE_BUILD_TIME:-unknown})"
              echo "deployment_status=verified" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Live app is still stale (commit: ${LIVE_COMMIT:-unknown}, changed: ${VERSION_CHANGED}, freshBuildTime: ${BUILD_TIME_IS_FRESH}) (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
            sleep 30
          done

          echo "❌ Could not confirm commit ${TARGET_COMMIT_SHORT} on production after $MAX_ATTEMPTS attempts (~15 min)"
          echo "deployment_status=failed" >> $GITHUB_OUTPUT
          exit 1
