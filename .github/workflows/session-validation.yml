name: Session Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - staging
      - production

jobs:
  validate-session:
    name: Validate Agent Session
    runs-on: ubuntu-latest
    # Skip for hotfix branches and bots
    if: |
      !startsWith(github.head_ref, 'hotfix/') &&
      !startsWith(github.head_ref, 'renovate/') &&
      !startsWith(github.head_ref, 'dependabot/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for session file
        id: session-check
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking for session file for branch: $BRANCH"
          
          # Look for a session file referencing this branch
          SESSION_FILE=$(grep -rl "Branch:.*\`${BRANCH}\`" docs/sessions/active/ 2>/dev/null | head -1 || true)
          
          if [ -n "$SESSION_FILE" ]; then
            echo "✅ Session file found: $SESSION_FILE"
            echo "session_found=true" >> $GITHUB_OUTPUT
            echo "session_file=$SESSION_FILE" >> $GITHUB_OUTPUT
          else
            # Check if any commit message contains HOTFIX bypass marker
            HOTFIX_COMMIT=$(git log origin/${{ github.base_ref }}..HEAD --oneline | grep -i 'hotfix\|emergency\|bypass' | head -1 || true)
            if [ -n "$HOTFIX_COMMIT" ]; then
              echo "⚠️  No session file found but detected hotfix markers in commits: $HOTFIX_COMMIT"
              echo "session_found=hotfix" >> $GITHUB_OUTPUT
            else
              echo "session_found=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post session status comment
        if: steps.session-check.outputs.session_found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ No Agent Session File Found
            
            This PR was opened from branch \`${branch}\` but no matching session file exists in \`docs/sessions/active/\`.
            
            **To fix this:**
            \`\`\`bash
            export AGENT_PREFIX=cc  # or codex, oh, etc.
            bash scripts/start-task.sh TER-NNNN
            git push
            \`\`\`
            
            **For emergency pushes:** Ensure the commit message contains \`HOTFIX\` or open a PR with title starting with \`[HOTFIX]\`.
            
            This check ensures all code changes are tracked to a Linear task and agent session for auditability.`
            });

      - name: Fail if no session
        if: steps.session-check.outputs.session_found == 'false'
        run: |
          echo "❌ FAIL: No session file found for branch ${{ github.head_ref }}"
          echo "All PRs must have a corresponding agent session file in docs/sessions/active/"
          echo "Run: bash scripts/start-task.sh TER-NNNN  to create one"
          exit 1

      - name: Warn on hotfix bypass
        if: steps.session-check.outputs.session_found == 'hotfix'
        run: |
          echo "⚠️  WARNING: Hotfix bypass detected. No session file present."
          echo "Hotfix bypasses are recorded in docs/agent-handoff/audit.log"
          echo "Please create a retrospective Linear task within 24h."
          # Do NOT fail — hotfix is explicitly allowed

      - name: Session validation passed
        if: steps.session-check.outputs.session_found == 'true'
        run: |
          echo "✅ Session validation passed: ${{ steps.session-check.outputs.session_file }}"
