name: Manus Self-Authorization

on:
  workflow_dispatch:
    inputs:
      public_key:
        description: 'SSH public key to authorize on factory droplet (paste full key line)'
        required: true
        type: string

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Authorize Manus public key on factory droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 143.198.153.23
          username: factory
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            PUBKEY="${{ github.event.inputs.public_key }}"
            # Remove any existing manus-agent key first (dedup)
            grep -v "manus-agent@terp-pm\|manus-droid-pm@terp" ~/.ssh/authorized_keys > /tmp/ak_clean 2>/dev/null && mv /tmp/ak_clean ~/.ssh/authorized_keys || true
            # Add the new key
            echo "$PUBKEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "Authorized: $PUBKEY"
            # Also update .manus/id_ed25519.pub for reference
            mkdir -p ~/.manus && echo "$PUBKEY" > ~/.manus/id_ed25519.pub
            echo "DONE"
