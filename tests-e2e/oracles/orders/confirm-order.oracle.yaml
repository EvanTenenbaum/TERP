# Oracle: Orders.Fulfillment.ConfirmOrder
# Validate non-shipping CTA contract on a confirmed SALE order

flow_id: "Orders.Fulfillment.ConfirmOrder"
description: "Validate non-shipping CTA contract for pending confirmed SALE orders"
role: "SuperAdmin"
seed_profile: "basic_sales"
tags:
  - tier1
  - orders
  - fulfillment
  - mutation
  - contract
  - non-shipping
timeout: 60000

preconditions:
  ensure:
    - entity: "client"
      ref: "seed:client.redwood"
      where:
        status: "active"
    - entity: "batch"
      ref: "seed:batch.og_kush"
      where:
        status: "LIVE"
        available_quantity_gte: 20
  create:
    - entity: "order"
      ref: "temp:order_to_confirm"
      data:
        order_type: "SALE"
        is_draft: false
        client_id: "$seed:client.redwood.id"
        order_number: "S-CONFIRM-{{timestamp}}"
        sale_status: "PENDING"
        fulfillment_status: "PENDING"
        total: "5000.00"
        items: '[{"batchId": "$seed:batch.og_kush.id", "quantity": 5, "unitPrice": 1000, "isSample": false}]'

steps:
  - action: navigate
    path: "/sales?tab=orders"
    wait_for: "[data-testid='orders-table'], table"

  - action: click
    target: "button[role='tab']:has-text('Confirmed'), [role='tab']:has-text('Confirmed')"
    wait_after: 500

  - action: type
    target: "[data-testid='orders-search-input']"
    value: "{{temp:order_to_confirm.orderNumber}}"
    clear_first: true

  - action: wait
    for: "table tbody tr:has-text('{{temp:order_to_confirm.orderNumber}}')"
    timeout: 10000

  - action: click
    target: "table tbody tr:has-text('{{temp:order_to_confirm.orderNumber}}')"
    wait_after: 500

  - action: assert
    text_contains: "Non-shipping mode"

  - action: assert
    not_visible: "[data-testid='confirm-fulfillment-btn'], button:has-text('Confirm for Fulfillment')"

  - action: assert
    not_visible: "[data-testid='ship-order-btn'], button:has-text('Ship Order')"

  - action: assert
    visible: "[data-testid='generate-invoice-btn'], button:has-text('Generate Invoice')"

  - action: screenshot
    name: "order_non_shipping_cta_contract"

expected_ui:
  visible:
    - "[data-testid='orders-table'], table"
    - "[data-testid='generate-invoice-btn'], button:has-text('Generate Invoice')"
  not_visible:
    - "[data-testid='confirm-fulfillment-btn'], button:has-text('Confirm for Fulfillment')"
    - "[data-testid='ship-order-btn'], button:has-text('Ship Order')"
  text_present:
    - "Non-shipping mode"

expected_db:
  orders:
    - where:
        order_number: "{{temp:order_to_confirm.orderNumber}}"
      expect:
        order_type: "SALE"
        is_draft: false
        fulfillment_status: "PENDING"
      store_as: "pending_order"

  invariants:
    - name: "Order remains pending in non-shipping mode"
      query: |
        SELECT fulfillment_status
        FROM orders
        WHERE id = $pending_order.id
      assert: "fulfillment_status = 'PENDING'"
