# Oracle: Orders.OrderStatus.UpdateOrderStatus
# Validate non-shipping status-control visibility and filtered-list stability

flow_id: "Orders.OrderStatus.UpdateOrderStatus"
description: "Validate non-shipping status control visibility and list stability for packed orders"
role: "SuperAdmin"
seed_profile: "basic_sales"
tags:
  - tier1
  - orders
  - status
  - mutation
  - contract
  - non-shipping
timeout: 60000

preconditions:
  ensure:
    - entity: "client"
      ref: "seed:client.redwood"
      where:
        status: "active"
    - entity: "batch"
      ref: "seed:batch.og_kush"
      where:
        status: "LIVE"
        available_quantity_gte: 20
  create:
    - entity: "order"
      ref: "temp:order_to_ship"
      data:
        order_type: "SALE"
        is_draft: false
        client_id: "$seed:client.redwood.id"
        order_number: "S-STATUS-{{timestamp}}"
        sale_status: "PENDING"
        fulfillment_status: "PACKED"
        packed_at: "{{date:now}}"
        total: "5000.00"
        items: '[{"batchId": "$seed:batch.og_kush.id", "quantity": 5, "unitPrice": 1000, "isSample": false, "pickedQuantity": 5}]'

steps:
  - action: navigate
    path: "/sales?tab=orders"
    wait_for: "[data-testid='orders-table'], table"

  - action: click
    target: "button[role='tab']:has-text('Confirmed'), [role='tab']:has-text('Confirmed')"
    wait_after: 500

  - action: type
    target: "[data-testid='orders-search-input']"
    value: "{{temp:order_to_ship.orderNumber}}"
    clear_first: true

  - action: wait
    for: "table tbody tr:has-text('{{temp:order_to_ship.orderNumber}}')"
    timeout: 10000

  - action: click
    target: "table tbody tr:has-text('{{temp:order_to_ship.orderNumber}}')"
    wait_after: 500

  - action: assert
    text_contains: "Non-shipping mode"

  - action: assert
    not_visible: "[data-testid='confirm-fulfillment-btn'], button:has-text('Confirm for Fulfillment')"

  - action: assert
    not_visible: "[data-testid='ship-order-btn'], button:has-text('Ship Order')"

  - action: click
    target: "button:has-text('Refresh')"
    wait_after: 500

  - action: wait
    for: "table tbody tr:has-text('{{temp:order_to_ship.orderNumber}}')"
    timeout: 10000

  - action: screenshot
    name: "order_status_non_shipping_contract"

expected_ui:
  visible:
    - "[data-testid='orders-table'], table"
    - "table tbody tr:has-text('{{temp:order_to_ship.orderNumber}}')"
  not_visible:
    - "[data-testid='confirm-fulfillment-btn'], button:has-text('Confirm for Fulfillment')"
    - "[data-testid='ship-order-btn'], button:has-text('Ship Order')"
  text_present:
    - "Non-shipping mode"
    - "PACKED"

expected_db:
  orders:
    - where:
        order_number: "{{temp:order_to_ship.orderNumber}}"
      expect:
        fulfillment_status: "PACKED"
        packed_at_not_null: true
      store_as: "packed_order"

  invariants:
    - name: "Packed status persists after refresh and filtering"
      query: |
        SELECT fulfillment_status
        FROM orders
        WHERE id = $packed_order.id
      assert: "fulfillment_status = 'PACKED'"
