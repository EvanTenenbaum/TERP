# Oracle: Accounting.Invoices.CheckOverdue
# Batch process to mark overdue invoices (typically scheduled job)

flow_id: "Accounting.Invoices.CheckOverdue"
description: "Execute overdue check to transition past-due invoices to OVERDUE status"
role: "AccountingManager"
seed_profile: "basic_sales"
tags:
  - tier2
  - accounting
  - invoices
  - batch-process
  - scheduled
  - mutation
timeout: 45000

preconditions:
  ensure:
    - entity: "invoice"
      ref: "seed:invoice.past_due"
      where:
        status_in: ["SENT", "VIEWED", "PARTIAL", "OVERDUE"]
        due_date_lt: "{{date:today}}"
        deletedAt_null: true

  # Note: This flow is typically API-only/scheduled
  # For E2E testing, we use admin tools or direct API call

steps:
  # Navigate to the unified invoices surface where the follow-up queue lives.
  - action: navigate
    path: "/accounting?tab=invoices"
    wait_for: "[data-testid='overdue-follow-up-banner'], [data-testid='focus-overdue-button'], main"

  - action: wait
    network_idle: true
    timeout: 10000

  # Trigger the manual overdue refresh from the sheet-native follow-up queue.
  - action: click
    target: "[data-testid='refresh-overdue-button'], button:has-text('Refresh Overdue')"
    wait_after: 3000

  - action: wait
    for: "[data-sonner-toast], [role='status'], text=overdue"
    timeout: 15000

  - action: screenshot
    name: "overdue_check_completed"

expected_ui:
  visible:
    - "[data-testid='overdue-follow-up-banner'], main"
  text_present:
    - "overdue"

expected_db:
  invoices:
    - where:
        id: "$seed:invoice.past_due.id"
      expect:
        status: "OVERDUE"

  # Verify other non-overdue invoices were not affected
  invariants:
    - name: "Only past-due invoices marked overdue"
      query: |
        SELECT COUNT(*) as count
        FROM invoices
        WHERE status = 'OVERDUE'
        AND due_date >= CURDATE()
        AND deleted_at IS NULL
      assert: "count = 0"
