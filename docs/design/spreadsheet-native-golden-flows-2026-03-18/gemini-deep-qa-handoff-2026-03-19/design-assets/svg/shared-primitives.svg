<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Spreadsheet-Native Shared Primitives</title>
  <rect width="1600" height="1180" fill="#f6f3ec" />
  
  
  <g>
    <rect x="44" y="36" width="1512" height="110" rx="28" fill="#103c39" />
    <text x="76" y="86" fill="#f8fafc" font-family="Arial" font-size="36" font-weight="700" letter-spacing="0" text-anchor="start">Spreadsheet-Native Shared Primitives</text>
    <text x="76" y="116" fill="#d6efe8" font-family="Arial" font-size="16" font-weight="500" letter-spacing="0" text-anchor="start">Shared March components across the pilot family: toggle, command strip, grid shell, support strip, selection surfacing, status bar, and secondary inspector.</text>
    
  <g>
    <rect x="1270" y="60" width="220" height="32" rx="16" fill="#1f5753" stroke="#2b6c67" />
    <text x="1380" y="81" fill="#d9f3ed" font-family="Arial" font-size="13" font-weight="600" letter-spacing="0" text-anchor="middle">Source: spreadsheet-native shared files</text>
  </g>
    <text x="1490" y="117" fill="#e9fff9" font-family="Arial" font-size="14" font-weight="700" letter-spacing="0" text-anchor="end">March 2026</text>
  </g>

  
  <rect x="72" y="190" width="700" height="404" rx="24" fill="#fffdf9" stroke="#d9d0bd" />
  <text x="100" y="230" fill="#1f2933" font-family="Arial" font-size="24" font-weight="700" letter-spacing="0" text-anchor="start">Surface Toggle + Command Strip</text>
  <text x="100" y="256" fill="#667085" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">These are the consistently repeated control areas the March pilot exposes before any grid content appears.</text>
  
    <text x="102" y="276" fill="#667085" font-family="Arial" font-size="12" font-weight="700" letter-spacing="1" text-anchor="start">SHEET MODE TOGGLE</text>
    
  <g>
    <rect x="102" y="296" width="180" height="46" rx="12" fill="#0f766e" stroke="#0f766e" />
    <text x="192" y="324" fill="#ffffff" font-family="Arial" font-size="14" font-weight="600" letter-spacing="0" text-anchor="middle">Sheet-Native Pilot</text>
  </g>
    
  <g>
    <rect x="294" y="296" width="164" height="46" rx="12" fill="#fffdf9" stroke="#d9d0bd" />
    <text x="376" y="324" fill="#1f2933" font-family="Arial" font-size="14" font-weight="600" letter-spacing="0" text-anchor="middle">Classic Surface</text>
  </g>
    <text x="102" y="390" fill="#667085" font-family="Arial" font-size="12" font-weight="700" letter-spacing="1" text-anchor="start">COMMAND STRIP</text>
    <rect x="102" y="410" width="640" height="138" rx="20" fill="#f7f3ea" stroke="#d9d0bd" />
    <text x="126" y="444" fill="#1f2933" font-family="Arial" font-size="18" font-weight="700" letter-spacing="0" text-anchor="start">Search, filter, pilot badge, and primary actions belong here.</text>
    <text x="126" y="470" fill="#667085" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">This strip is for fast orientation and row-scoped actions before the user ever touches the inspector.</text>
    
  <g>
    <rect x="126" y="492" width="118" height="40" rx="12" fill="#fffdf9" stroke="#d9d0bd" />
    <text x="185" y="517" fill="#1f2933" font-family="Arial" font-size="14" font-weight="600" letter-spacing="0" text-anchor="middle">Refresh</text>
  </g>
    
  <g>
    <rect x="256" y="492" width="122" height="40" rx="12" fill="#0f766e" stroke="#0f766e" />
    <text x="317" y="517" fill="#ffffff" font-family="Arial" font-size="14" font-weight="600" letter-spacing="0" text-anchor="middle">New Draft</text>
  </g>
    
  <g>
    <rect x="390" y="492" width="120" height="40" rx="12" fill="#fffdf9" stroke="#d9d0bd" />
