font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Golden State</text><text x="524" y="432" fill="#1f2933" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Blue Dream / Edible</text><text x="756" y="432" fill="#0f766e" font-family="Courier New" font-size="14" font-weight="600" letter-spacing="0" text-anchor="start">FULFILLED</text><text x="870" y="432" fill="#1f2933" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">WITH_CLIENT</text><text x="980" y="432" fill="#1f2933" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Mar 25</text><rect x="101" y="446" width="956" height="40" fill="#edf7f6" /><line x1="100" y1="446" x2="1058" y2="446" stroke="#d9d0bd" /><text x="116" y="472" fill="#0f766e" font-family="Courier New" font-size="14" font-weight="600" letter-spacing="0" text-anchor="start">OUT</text><text x="226" y="472" fill="#1f2933" font-family="Courier New" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">SMP-218</text><text x="336" y="472" fill="#1f2933" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Harbor</text><text x="524" y="472" fill="#1f2933" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Lemon Kush 7g</text><text x="756" y="472" fill="#0f766e" font-family="Courier New" font-size="14" font-weight="600" letter-spacing="0" text-anchor="start">PENDING</text><text x="870" y="472" fill="#1f2933" font-family="Courier New" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">WAREHOUSE</text><text x="980" y="472" fill="#1f2933" font-family="Arial" font-size="14" font-weight="500" letter-spacing="0" text-anchor="start">Mar 22</text><rect x="101" y="486" width="956" height="40" fill="#fffdf9" /><line x1="100" y1="486" x2="1058" y2="486" stroke="#d9d0bd" /><text x="116" y="512" fill="#0f766e" 